<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d11">
<title>Мой бюджет</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d11;
    --surface: #16161e;
    --surface2: #1e1e28;
    --border: #25253080;
    --text: #ede8e0;
    --muted: #50506a;
    --accent: #c8a96e;
    --accent-light: #e2c48a;
    --green: #7ec8a0;
    --red: #e0747a;
    --yellow: #d4a853;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
    overflow-x: hidden;
  }

  /* Subtle noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  /* Header */
  .header {
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease both;
  }
  .header-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .header-title span {
    color: var(--accent);
  }

  /* Summary */
  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 20px 18px;
    margin-bottom: 20px;
    animation: fadeUp 0.5s 0.08s ease both;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 18px;
  }
  .summary-item-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .summary-item-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .summary-item-val.left-val { color: var(--green); transition: color 0.4s; }
  .summary-item-val.spent-val { color: var(--accent); }
  .summary-budget-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .summary-budget-label { font-size: 10px; color: var(--muted); }
  .summary-budget-pct { font-size: 10px; color: var(--muted); }
  .bar-bg {
    background: var(--surface2);
    border-radius: 6px;
    height: 7px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.4s;
  }

  /* Category cards */
  .cats {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    animation: fadeUp 0.4s ease both;
    transition: border-color 0.2s;
  }
  .cat:active { border-color: var(--accent); }

  .cat-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .cat-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cat-emoji { font-size: 20px; }
  .cat-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .cat-note { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .cat-amounts { text-align: right; }
  .cat-left {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    transition: color 0.3s;
  }
  .cat-budget-label { font-size: 10px; color: var(--muted); }

  .cat-bar { margin-bottom: 12px; }

  .cat-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .cat-input {
    flex: 1;
    min-width: 0;
    background: var(--surface2);
    border: 1px solid #2a2a38;
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .cat-input:focus { border-color: var(--accent); }
  .cat-input::placeholder { color: #32323e; }

  .btn-spend {
    background: var(--accent);
    color: #0d0d11;
    border: none;
    border-radius: 10px;
    padding: 9px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    -webkit-appearance: none;
  }
  .btn-spend:active { background: var(--accent-light); transform: scale(0.96); }

  .btn-reset {
    background: transparent;
    border: 1px solid #2a2a38;
    border-radius: 10px;
    padding: 9px 10px;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    -webkit-appearance: none;
  }
  .btn-reset:active { color: var(--red); border-color: var(--red); }

  .cat-spent-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    text-align: right;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--accent);
    z-index: 999;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
    opacity: 0;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 10px;
    color: #252535;
    margin-top: 32px;
    letter-spacing: 1px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Input number spinners off */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="header-label">Бюджет месяца</div>
    <div class="header-title">Мои <span>расходы</span></div>
  </div>

  <div class="summary">
    <div class="summary-grid">
      <div>
        <div class="summary-item-label">Осталось</div>
        <div class="summary-item-val left-val" id="totalLeft">60 000 ₽</div>
      </div>
      <div>
        <div class="summary-item-label">Потрачено</div>
        <div class="summary-item-val spent-val" id="totalSpent">0 ₽</div>
      </div>
    </div>
    <div class="summary-budget-row">
      <span class="summary-budget-label">из 60 000 ₽</span>
      <span class="summary-budget-pct" id="totalPct">0%</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fill" id="totalBar" style="width:0%;background:var(--green)"></div>
    </div>
  </div>

  <div class="cats" id="cats"></div>

  <div class="footer">общий бюджет · данные в облаке</div>
</div>

<div class="toast" id="toast"></div>
<div id="loader" style="display:none;position:fixed;inset:0;background:#0d0d11cc;z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
  <div style="width:32px;height:32px;border:2px solid #25253080;border-top-color:#c8a96e;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  <div style="font-size:11px;color:#50506a;letter-spacing:2px;">ЗАГРУЗКА</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
const BUDGET = [
  { id:1, name:'Подписки',          emoji:'📱', note:'VPN, телефон, Claude', budget:3300  },
  { id:2, name:'Такси',             emoji:'🚕', note:'',                      budget:7000  },
  { id:3, name:'Продукты',          emoji:'🛒', note:'',                      budget:20000 },
  { id:4, name:'Витамины',          emoji:'💊', note:'',                      budget:2000  },
  { id:5, name:'Бензин',            emoji:'⛽', note:'',                      budget:3500  },
  { id:6, name:'Кафе и рестораны',  emoji:'☕', note:'',                      budget:10000 },
  { id:7, name:'Ozon',              emoji:'📦', note:'',                      budget:1200  },
  { id:8, name:'Карманные',         emoji:'👜', note:'',                      budget:3000  },
  { id:9, name:'Бьюти процедуры',   emoji:'💅', note:'',                      budget:10000 },
];

const TOTAL = BUDGET.reduce((s,c)=>s+c.budget,0);

// Telegram WebApp init
const tg = window.Telegram?.WebApp;
if(tg) tg.ready();

const state = {};
BUDGET.forEach(c=>{ state[c.id]=0; });

// JSONBin — общее облачное хранилище для двух пользователей
const BIN_ID = '6a233de1f5f4af5e29bff758';
const API_KEY = '$2a$10$QCVZBsaK/4qTvEO9SigzCOqgQEnNX1X9TAScyDnQhNN4Xwlj5akHS';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

function saveState(){
  fetch(BIN_URL, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': API_KEY
    },
    body: JSON.stringify(state)
  }).catch(()=>{});
}

function loadAndRender(){
  showLoading(true);
  fetch(BIN_URL + '/latest', {
    headers: { 'X-Master-Key': API_KEY }
  })
  .then(r=>r.json())
  .then(data=>{
    const saved = data.record;
    if(saved) BUDGET.forEach(c=>{ state[c.id] = saved[c.id]||0; });
  })
  .catch(()=>{})
  .finally(()=>{
    showLoading(false);
    renderCats();
    updateSummary();
  });
}

function showLoading(on){
  document.getElementById('loader').style.display = on ? 'flex' : 'none';
}

function fmt(n){ return n.toLocaleString('ru-RU')+'&thinsp;₽'; }

function barColor(pct){
  if(pct>80) return 'var(--red)';
  if(pct>50) return 'var(--yellow)';
  return 'var(--green)';
}

function updateSummary(){
  const spent = Object.values(state).reduce((s,v)=>s+v,0);
  const left  = TOTAL - spent;
  const pct   = Math.min(spent/TOTAL*100,100);
  document.getElementById('totalLeft').innerHTML  = fmt(left);
  document.getElementById('totalSpent').innerHTML = fmt(spent);
  document.getElementById('totalPct').textContent = pct.toFixed(1)+'%';
  const bar = document.getElementById('totalBar');
  bar.style.width = pct+'%';
  bar.style.background = barColor(pct);
  const el = document.getElementById('totalLeft');
  el.style.color = left < TOTAL*0.2 ? 'var(--red)' : 'var(--green)';
}

function updateCard(cat){
  const spent = state[cat.id];
  const left  = cat.budget - spent;
  const pct   = Math.min(spent/cat.budget*100,100);

  const leftEl = document.getElementById('left-'+cat.id);
  leftEl.innerHTML = fmt(left);
  leftEl.style.color = pct>80?'var(--red)':pct>50?'var(--yellow)':'var(--text)';

  document.getElementById('bar-'+cat.id).style.width = pct+'%';
  document.getElementById('bar-'+cat.id).style.background = barColor(pct);

  const spentLabel = document.getElementById('spent-label-'+cat.id);
  if(spent>0){
    spentLabel.innerHTML = 'потрачено: '+fmt(spent);
    spentLabel.style.display='block';
    document.getElementById('reset-'+cat.id).style.display='flex';
  } else {
    spentLabel.style.display='none';
    document.getElementById('reset-'+cat.id).style.display='none';
  }
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),2000);
}

function spend(cat){
  const input = document.getElementById('input-'+cat.id);
  const raw = parseFloat(input.value.replace(',','.'));
  if(!raw || raw<=0){ showToast('Введи сумму'); return; }
  const avail = cat.budget - state[cat.id];
  const amt = Math.min(raw, avail);
  state[cat.id] = Math.min(state[cat.id]+amt, cat.budget);
  saveState();
  input.value='';
  updateCard(cat);
  updateSummary();
  if(amt<raw) showToast('Больше бюджета! Списано '+amt.toLocaleString('ru-RU')+' ₽');
  else showToast('−'+amt.toLocaleString('ru-RU')+' ₽');
}

function reset(cat){
  state[cat.id]=0;
  saveState();
  updateCard(cat);
  updateSummary();
  showToast('Сброшено');
}

function renderCats(){
  const container = document.getElementById('cats');
  BUDGET.forEach((cat,i)=>{
    const div = document.createElement('div');
    div.className='cat';
    div.style.animationDelay=(0.12+i*0.05)+'s';
    div.innerHTML=`
      <div class="cat-top">
        <div>
          <div class="cat-name-row">
            <span class="cat-emoji">${cat.emoji}</span>
            <span class="cat-name">${cat.name}</span>
          </div>
          ${cat.note?`<div class="cat-note">${cat.note}</div>`:''}
        </div>
        <div class="cat-amounts">
          <div class="cat-left" id="left-${cat.id}">${fmt(cat.budget)}</div>
          <div class="cat-budget-label">из ${cat.budget.toLocaleString('ru-RU')} ₽</div>
        </div>
      </div>
      <div class="cat-bar">
        <div class="bar-bg">
          <div class="bar-fill" id="bar-${cat.id}" style="width:0%;background:var(--green)"></div>
        </div>
      </div>
      <div class="cat-controls">
        <input class="cat-input" id="input-${cat.id}" type="number" min="0" placeholder="Сумма" inputmode="decimal">
        <button class="btn-spend" onclick="spend(BUDGET[${i}])">− Списать</button>
        <button class="btn-reset" id="reset-${cat.id}" onclick="reset(BUDGET[${i}])" style="display:none">↺</button>
      </div>
      <div class="cat-spent-label" id="spent-label-${cat.id}" style="display:none"></div>
    `;
    container.appendChild(div);

    // Применяем сохранённое состояние сразу после рендера карточки
    updateCard(cat);

    // Enter key
    setTimeout(()=>{
      document.getElementById('input-'+cat.id).addEventListener('keydown',e=>{
        if(e.key==='Enter'){ e.preventDefault(); spend(cat); }
      });
    },0);
  });
}

loadAndRender();
</script>
</body>
</html>
